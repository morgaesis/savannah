<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>African Plain</title>
  <meta name="description" content="Pixel art African savanna screensaver with ecosystem simulation. 8 animal species, day/night cycle, predator-prey dynamics, procedural audio.">
  <meta property="og:title" content="African Plain — Savanna Screensaver">
  <meta property="og:description" content="Pixel art ecosystem simulation with 8 animal species, full day/night cycle, and procedural audio.">
  <meta property="og:image" content="https://africa.morgaes.is/og.png">
  <meta property="og:url" content="https://africa.morgaes.is">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="African Plain — Savanna Screensaver">
  <meta name="twitter:description" content="Pixel art ecosystem simulation. Lions hunt, herds flee, birds roost at night.">
  <meta name="twitter:image" content="https://africa.morgaes.is/og.png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a15; }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: pointer;
    }
    #controls {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      color: #bbb;
      font: 11px/1.5 monospace;
      padding: 5px 8px;
      border-radius: 4px;
      transition: opacity 0.8s ease;
      z-index: 10;
      user-select: none;
    }
    #controls.collapsed { opacity: 0.15; }
    #controls.collapsed:hover { opacity: 1; }
    #ctrl-body { display: block; }
    #ctrl-body.hidden { display: none; }
    #controls input[type=range] {
      width: 70px;
      height: 8px;
      vertical-align: middle;
      accent-color: #a88040;
    }
    #controls select {
      background: rgba(30,30,30,0.8);
      color: #bbb;
      border: 1px solid #555;
      font: 10px monospace;
      border-radius: 2px;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <span id="toggle" style="cursor:pointer;">[&minus;]</span>
    <div id="ctrl-body">
      <div>fps: <span id="fps">0</span> | <span id="pop">0</span> alive</div>
      <canvas id="minimap" width="80" height="24" style="display:block;margin:2px 0;border:1px solid rgba(80,70,50,0.3);border-radius:2px;image-rendering:pixelated;"></canvas>
      <div>
        <span id="time-display">18:00</span>
        <canvas id="time-dial" width="28" height="28" style="vertical-align:middle;cursor:pointer;border-radius:50%;" title="Drag to set time"></canvas>
        <input type="range" id="time-slider" min="0" max="1440" step="1" style="display:none;">
        <span id="skip-btns" style="font-size:9px;cursor:pointer;color:#a88040;">
          <span title="Dawn" onclick="window._skipTime(6)">&#x1F305;</span>
          <span title="Noon" onclick="window._skipTime(12)">&#x2600;</span>
          <span title="Sunset" onclick="window._skipTime(17.5)">&#x1F307;</span>
          <span title="Night" onclick="window._skipTime(21)">&#x1F319;</span>
        </span>
      </div>
      <div>
        day:
        <select id="day-length">
          <option value="60">1m</option>
          <option value="300">5m</option>
          <option value="1800">30m</option>
          <option value="7200">2h</option>
          <option value="43200">12h</option>
          <option value="86400" selected>24h</option>
        </select>
      </div>
      <div>
        <span id="mute-btn" style="cursor:pointer;font-size:10px;color:#a88040;" onclick="window._toggleMute()" title="Toggle sound">&#x1F50A;</span>
      </div>
    </div>
  </div>

  <script src="engine.js"></script>

  <script>
    (function() {
      const es = new EventSource('/__reload');
      es.onmessage = function(e) {
        if (e.data === 'reload') location.reload();
      };
    })();
  </script>
</body>
</html>
